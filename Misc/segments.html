<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <title>Segmented Lines in Plotly (Manual Segments)</title>
</head>
<body>
  <div id="graph"></div>

  <script>
    // Define the data for the segmented line (with breaks)
    const X = [0, 1, 2, null, 3, 4, null, 5, 6]; // 'null' creates line breaks
    const Y = [1, 3, 2, null, 5, 4, null, 6, 7]; // 'null' creates line breaks

    // Define the trace for the segmented line
    let trace = {
      x: X,
      y: Y,
      mode: 'lines',
      name: 'Segmented Line',
      line: {
        color: 'red',
        width: 3
      }
    };

    // Plot the graph
    let data = [trace];

    let layout = {
      title: 'Segmented Line using Null Values',
      xaxis: { title: 'X-axis' },
      yaxis: { title: 'Y-axis' }
    };

    Plotly.newPlot('graph', data, layout);
  </script>
</body>
</html>
